<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reminders</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app">
        <!-- Left Column: Mini Calendar + Tasks -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h1>Kalendar</h1>
            </div>
            
            <div class="calendar-widget">
                <div class="calendar-nav">
                    <button id="prevMonth" class="nav-btn">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M15 18l-6-6 6-6"/>
                        </svg>
                    </button>
                    <h2 id="currentMonth"></h2>
                    <button id="nextMonth" class="nav-btn">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M9 18l6-6-6-6"/>
                        </svg>
                    </button>
                </div>
                <div class="calendar-grid">
                    <div class="day-header">Po</div>
                    <div class="day-header">Ut</div>
                    <div class="day-header">St</div>
                    <div class="day-header">Ct</div>
                    <div class="day-header">Pa</div>
                    <div class="day-header">So</div>
                    <div class="day-header">Ne</div>
                </div>
                <div class="calendar-days" id="calendarDays"></div>
            </div>

            <div class="sidebar-tasks">
                <div class="sidebar-tasks-header">
                    <h3>Ulohy</h3>
                </div>
                <div id="tasksListCompact"></div>
            </div>
        </aside>

        <!-- Middle Column: Weekly Calendar View -->
        <main class="main-content">
            <div class="content-header">
                <h2 id="weekRangeLabel"></h2>
                <div class="week-nav">
                    <button id="prevWeek" class="nav-btn">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M15 18l-6-6 6-6"/>
                        </svg>
                    </button>
                    <button id="nextWeek" class="nav-btn">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M9 18l6-6-6-6"/>
                        </svg>
                    </button>
                </div>
            </div>
            <div class="weekly-calendar">
                <div class="week-header" id="weekHeader"></div>
                <div class="week-body" id="weekBody"></div>
            </div>
        </main>

        <!-- Right Column: Read Later -->
        <aside class="right-sidebar">
            <div class="right-sidebar-header">
                <h2>K precteni</h2>
            </div>
            <div id="readLaterList"></div>
        </aside>
    </div>

    <!-- Add Form Modal Trigger -->
    <button class="fab" id="openAddModal">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <path d="M12 5v14M5 12h14"/>
        </svg>
    </button>

    <!-- Add Modal -->
    <div class="modal-overlay" id="addModal">
        <div class="modal">
            <div class="modal-header">
                <h3>Pridat</h3>
                <button class="close-btn" id="closeModal">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M18 6L6 18M6 6l12 12"/>
                    </svg>
                </button>
            </div>
            <form id="addForm">
                <input type="text" id="reminderText" placeholder="Text nebo poznamka..." required>
                <input type="url" id="reminderUrl" placeholder="URL (volitelne)">
                <input type="datetime-local" id="reminderDate">
                <button type="submit" class="submit-btn">Pridat</button>
            </form>
            <div class="help-text">
                Ulozeno lokalne. Pro synchronizaci pouzij <code>/r</code> v Telegramu.
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
