<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reminders</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app">

        <!-- ── Left Sidebar ── -->
        <aside class="sidebar">

            <div class="sidebar-brand">
                <div class="brand-icon">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                        <rect x="3" y="4" width="18" height="18" rx="2"/>
                        <line x1="16" y1="2" x2="16" y2="6"/>
                        <line x1="8" y1="2" x2="8" y2="6"/>
                        <line x1="3" y1="10" x2="21" y2="10"/>
                    </svg>
                </div>
                <span>Reminders</span>
            </div>

            <button class="create-btn" id="openAddModal">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                    <path d="M12 5v14M5 12h14"/>
                </svg>
                Pridat
            </button>

            <!-- Mini Calendar -->
            <div class="mini-cal">
                <div class="mini-cal-nav">
                    <button id="prevMonth" class="mini-nav-btn">
                        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
                    </button>
                    <span id="currentMonth" class="mini-cal-title"></span>
                    <button id="nextMonth" class="mini-nav-btn">
                        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
                    </button>
                </div>
                <div class="mini-cal-grid">
                    <div class="mini-day-hdr">Po</div>
                    <div class="mini-day-hdr">Ut</div>
                    <div class="mini-day-hdr">St</div>
                    <div class="mini-day-hdr">Ct</div>
                    <div class="mini-day-hdr">Pa</div>
                    <div class="mini-day-hdr">So</div>
                    <div class="mini-day-hdr">Ne</div>
                </div>
                <div class="mini-cal-days" id="calendarDays"></div>
            </div>

            <!-- Upcoming Tasks -->
            <div class="sidebar-section">
                <div class="sidebar-section-hdr">
                    <span class="section-label">Ulohy</span>
                    <label class="pending-toggle">
                        <input type="checkbox" id="showOnlyPending" checked>
                        <span>Jen cekajici</span>
                    </label>
                </div>
                <div id="tasksListCompact"></div>
            </div>

            <!-- Read Later -->
            <div class="sidebar-section sidebar-read-later">
                <div class="sidebar-section-hdr">
                    <span class="section-label">K precteni</span>
                </div>
                <div id="readLaterList"></div>
            </div>

        </aside>

        <!-- ── Main Content ── -->
        <main class="main-content">

            <div class="main-header">
                <div class="main-header-left">
                    <h2 class="main-month-label" id="mainMonthLabel"></h2>
                    <div class="main-nav">
                        <button id="prevMainPeriod" class="main-nav-btn">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
                        </button>
                        <button id="nextMainPeriod" class="main-nav-btn">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
                        </button>
                    </div>
                    <button id="todayBtn" class="today-btn">Dnes</button>
                </div>
                <div class="view-tabs">
                    <button class="view-tab active" data-view="monthly">Mesicni</button>
                    <button class="view-tab" data-view="weekly">Tydenny</button>
                </div>
            </div>

            <!-- Monthly View -->
            <div id="monthlyView" class="monthly-view">
                <div class="main-cal-header">
                    <div class="main-day-hdr">Po</div>
                    <div class="main-day-hdr">Ut</div>
                    <div class="main-day-hdr">St</div>
                    <div class="main-day-hdr">Ct</div>
                    <div class="main-day-hdr">Pa</div>
                    <div class="main-day-hdr">So</div>
                    <div class="main-day-hdr">Ne</div>
                </div>
                <div class="main-cal-grid" id="mainCalGrid"></div>
            </div>

            <!-- Weekly View -->
            <div id="weeklyView" class="weekly-view hidden">
                <div class="week-header" id="weekHeader"></div>
                <div class="week-body" id="weekBody"></div>
            </div>

        </main>
    </div>

    <!-- Add Modal -->
    <div class="modal-overlay" id="addModal">
        <div class="modal">
            <div class="modal-header">
                <h3>Pridat reminder</h3>
                <button class="close-btn" id="closeModal">
                    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
                </button>
            </div>
            <form id="addForm">
                <input type="text" id="reminderText" placeholder="Text nebo poznamka..." required>
                <input type="url" id="reminderUrl" placeholder="URL (volitelne)">
                <input type="datetime-local" id="reminderDate">
                <button type="submit" class="submit-btn">Pridat</button>
            </form>
            <div class="help-text">
                Ulozeno lokalne. Pro synchronizaci pouzij <code>/r</code> v Telegramu.
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
