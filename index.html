<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saved & Reminders - Ondrej</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🔖 Saved & Reminders</h1>
            <div class="header-actions">
                <label class="toggle-filter">
                    <input type="checkbox" id="showOnlyPending" checked>
                    <span>Jen aktivní</span>
                </label>
            </div>
        </header>

        <div class="main-layout">
            <!-- Left Column: Calendar -->
            <div class="calendar-section">
                <div class="calendar-header">
                    <button id="prevMonth">←</button>
                    <h2 id="currentMonth"></h2>
                    <button id="nextMonth">→</button>
                </div>
                <div class="calendar-grid">
                    <div class="day-header">Po</div>
                    <div class="day-header">Út</div>
                    <div class="day-header">St</div>
                    <div class="day-header">Čt</div>
                    <div class="day-header">Pá</div>
                    <div class="day-header">So</div>
                    <div class="day-header">Ne</div>
                </div>
                <div class="calendar-days" id="calendarDays"></div>
            </div>

            <!-- Right Column: List -->
            <div class="list-section">
                <div class="stats" id="stats">
                    <span id="pendingCount">0</span> aktivních · 
                    <span id="totalCount">0</span> celkem
                </div>
                <div id="remindersList"></div>
            </div>
        </div>

        <!-- Add Form -->
        <div class="add-form">
            <h3>➕ Přidat</h3>
            <form id="addForm">
                <input type="text" id="reminderText" placeholder="Text nebo poznámka..." required>
                <input type="url" id="reminderUrl" placeholder="URL (volitelné)">
                <input type="datetime-local" id="reminderDate">
                <button type="submit">Přidat</button>
            </form>
            <div class="help-text">
                💡 Vše se ukládá lokálně. Pro synchronizaci s GitHub použij <code>/r</code> command v Telegramu.
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
